# Search Aggregator - Main Configuration
# 加载顺序: settings.yaml -> config/channels/*.yaml

app:
  name: "Search Aggregator"
  version: "1.0.0"
  host: "0.0.0.0"
  port: 8830
  debug: false

# 全局默认值
defaults:
  timeout: 5                     # 单次请求超时(秒)
  max_retries: 1                 # 失败重试次数
  retry_delay: 1.0              # 重试间隔(秒)

# 日志配置
logging:
  level: "INFO"                  # DEBUG/INFO/WARNING/ERROR
  dir: "data/logs"              # 日志目录
  rotation: "10 MB"             # 单文件最大
  retention: "30 days"          # 保留时长
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level:<8} | {name}:{function}:{line} | {message}"

# 监控配置
monitor:
  enabled: true
  health_check_interval: 60     # 健康检查间隔(秒)
  stats_window: 3600            # 统计窗口(秒)

# 报警配置
alert:
  enabled: true
  channels:
    - type: "log"               # 日志报警
      level: "WARNING"
    # - type: "webhook"         # Webhook 报警 (待扩展)
    #   url: "https://hooks.example.com/alert"
  rules:
    failure_threshold: 3         # 连续失败N次触发报警
    timeout_threshold: 5000      # 超时阈值(毫秒)
    rate_limit_buffer: 0.8       # 速率限制使用率达80%时预警

# 搜索渠道优先级 (数字越小优先级越高)
# 具体渠道配置在 config/channels/ 目录下
channels_priority:
  - exa
  - tavily
  - tinyfish
